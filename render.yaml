services:
  # ── Backend: FastAPI ───────────────────────────────────────────
  - type: web
    name: health-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000

  # ── Frontend: React / Vite static site ────────────────────────
  - type: web
    name: health-ai-frontend
    runtime: static
    rootDir: frontend/Health-AI
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # ⚠️  After your first deploy, update this to your actual backend URL
        # e.g. https://health-ai-backend.onrender.com
        value: https://health-ai-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

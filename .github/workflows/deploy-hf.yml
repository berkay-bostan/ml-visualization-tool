name: Deploy backend to Hugging Face Spaces

on:
  push:
    branches:
      - liveDemo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Install and configure git-lfs
          git lfs install
          
          # Clone the Hugging Face Space repository
          git clone https://karakayalperen:$HF_TOKEN@huggingface.co/spaces/karakayalperen/health-ai-backend hf_space
          
          # Sync the contents of the backend directory to the Space repository
          rsync -av --delete --exclude='.git/' backend/ hf_space/
          
          # Commit and push with LFS support for CSV files
          cd hf_space
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git lfs track "*.csv"
          git add .gitattributes
          git add .
          git commit -m "Auto-sync backend from GitHub to Hugging Face Space" || echo "No changes to commit"
          git push origin main
